<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Analytics Portfolio</title>
    <style>
        :root { --primary: #1e293b; --accent: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #334155; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; }
        header { background-color: var(--primary); color: white; padding: 40px 20px; text-align: center; }
        nav { display: flex; justify-content: center; gap: 20px; background: #0f172a; padding: 12px; position: sticky; top: 0; z-index: 100; }
        nav a { color: #94a3b8; text-decoration: none; font-weight: 500; }
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .project-card { background: var(--card); border: 1px solid #e2e8f0; border-radius: 12px; padding: 30px; margin-bottom: 50px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .project-tag { display: inline-block; background: #eff6ff; color: var(--accent); padding: 4px 12px; border-radius: 9999px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; margin-bottom: 12px; }
        .project-tag.powerbi { background: #fffbeb; color: #b45309; }
        .dashboard-frame-container { width: 100%; border-radius: 8px; overflow: hidden; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        iframe, .preview-img { width: 100%; height: 500px; border: none; display: block; object-fit: contain; }
        .btn-download { display: inline-block; background-color: var(--primary); color: white; padding: 12px 24px; text-decoration: none; border-radius: 8px; font-weight: 600; }
    </style>
</head>
<body>

    <header><h1>Data Analytics Portfolio</h1></header>

    <nav>
        <a href="#looker">Looker</a>
        <a href="#tableau">Tableau</a>
        <a href="#powerbi">Power BI</a>
    </nav>

    <div class="container">

        <div class="project-card" id="looker">
            <span class="project-tag">Looker Studio</span>
            <h2>Marketing Campaign ROI</h2>
            <div class="dashboard-frame-container">
                <iframe src="https://lookerstudio.google.com/embed/reporting/403029a0-89f9-4d26-aa3c-7df836fbb089/page/XK2zF" allowfullscreen></iframe>
            </div>
        </div>

        <div class="project-card" id="tableau">
            <span class="project-tag">Tableau</span>
            <h2>Global Logistics & Supply Chain</h2>
            <div class="dashboard-frame-container">
                <iframe src="https://public.tableau.com/views/EnterpriseWorkforceRiskAudit/WorkforceRiskAudit?:embed=true"></iframe>
            </div>
        </div>

        <div class="project-card" id="powerbi">
            <span class="project-tag powerbi">Power BI</span>
            <h2>Global ESG Insights Hub</h2>
            <div class="dashboard-frame-container">
                <img class="preview-img" src="assets/Tab%202_The%20Interactive%20Wealth%20vs.%20Emissions%20Tracker.PNG">
            </div>
            <div class="dashboard-frame-container">
                <img class="preview-img" src="assets/Tab1_Macro%20Executive%20View.PNG">
            </div>
            <a href="assets/Global%20ESG%20Insights%20Hub_Regional%20Acceleration%20Model.pbix" download class="btn-download">📥 Download .PBIX File</a>
        </div>

    </div>
</body>
</html>
